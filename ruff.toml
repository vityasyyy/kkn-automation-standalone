exclude        = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "site-packages",
  "venv",
]
line-length    = 120
indent-width   = 4
target-version = "py314"

[lint]
  select  = ["I", "F"]
  ignore  = ["F405", "F403", "E741"]
  fixable = ["ALL"]

[format]
  quote-style               = "double"
  indent-style              = "space"
  skip-magic-trailing-comma = false
  docstring-code-format     = true

name: Daily KKN Attendance

on:
  schedule:
    # 10:00 WIB = 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  attendance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run daily attendance
        env:
          SIMASTER_USERNAME: ${{ secrets.SIMASTER_USERNAME }}
          SIMASTER_PASSWORD: ${{ secrets.SIMASTER_PASSWORD }}
          USERNAMES: ${{ secrets.USERNAMES }}
          QR_CODE_VALUE: ${{ secrets.QR_CODE_VALUE }}
          KKN_LOCATION_LATITUDE: ${{ secrets.KKN_LOCATION_LATITUDE }}
          KKN_LOCATION_LONGITUDE: ${{ secrets.KKN_LOCATION_LONGITUDE }}
          KKN_LOCATION_RADIUS_METERS: ${{ secrets.KKN_LOCATION_RADIUS_METERS }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
          IDEMPOTENT: "true"
          THROTTLE: "true"
          SHUFFLE: "true"
          MAX_RETRIES: "3"
        run: uv run python src/main.py -s --headless --report

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kkn-reports
          path: reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kkn-logs
          path: logs/
          retention-days: 7
          if-no-files-found: warn